<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#667eea">
    <meta name="description" content="여행 일정을 한눈에 정리하고, AI가 여행지 정보를 자동으로 조사해 채워주는 여행 플래너">
    <script src="https://accounts.google.com/gsi/client" async></script>
    <script src="./auth.js"></script>
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%23667eea' width='192' height='192' rx='45'/><text x='50%' y='50%' font-size='80' font-weight='bold' fill='white' text-anchor='middle' dominant-baseline='middle'>김</text></svg>">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="김비서">
    <title>여행 일정 총정리 - 김비서</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f5;
            --card-bg: rgba(255, 255, 255, 0.7);
            --card-border: rgba(255, 255, 255, 0.3);
            --text-primary: #1a1a2e;
            --text-secondary: #666666;
            --accent: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --accent-hover: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        html.dark-mode {
            --bg-primary: #0f0f23;
            --bg-secondary: #1a1a3e;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-primary: #e0e0e0;
            --text-secondary: #b0b0b0;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            padding: 40px 20px 80px;
            color: var(--text-primary);
            transition: background 0.3s ease;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        @media (min-width: 768px) { body { padding: 40px 30px 80px; } }
        @media (min-width: 1024px) { body { padding: 40px 40px 80px; } }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(102, 126, 234, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(118, 75, 162, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .theme-toggle {
            position: fixed;
            top: 15px; right: 15px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(10px);
            padding: 8px 12px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.2em;
            transition: all 0.3s ease;
            z-index: 100;
            box-shadow: var(--shadow);
        }
        .theme-toggle:hover { transform: scale(1.1); }

        .wrap { max-width: 1100px; margin: 0 auto; position: relative; z-index: 1; }

        /* 상단 네비 */
        .topnav {
            display: flex; flex-wrap: wrap; gap: 10px;
            margin-bottom: 24px;
        }
        .topnav a {
            text-decoration: none;
            color: var(--text-secondary);
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.9em;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .topnav a:hover { transform: translateY(-2px); color: var(--text-primary); }
        .topnav a.active {
            background: var(--accent);
            color: #fff;
            border-color: transparent;
        }

        .header { margin-bottom: 28px; }
        .header h1 {
            font-size: 2.2em;
            font-weight: 700;
            background: var(--accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
        }
        .header p { color: var(--text-secondary); font-size: 1.05em; }

        /* AI 조사 패널 */
        .ai-panel {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 24px;
            box-shadow: var(--shadow);
            margin-bottom: 32px;
        }
        .ai-panel h2 { font-size: 1.2em; margin-bottom: 6px; }
        .ai-panel .hint { color: var(--text-secondary); font-size: 0.9em; margin-bottom: 16px; }
        .ai-form { display: flex; flex-wrap: wrap; gap: 12px; align-items: stretch; }
        .ai-form input, .ai-form select {
            background: rgba(255,255,255,0.08);
            border: 1px solid var(--card-border);
            color: var(--text-primary);
            border-radius: 14px;
            padding: 14px 16px;
            font-size: 1em;
            outline: none;
            transition: border-color 0.2s ease;
        }
        .ai-form input { flex: 1 1 260px; }
        .ai-form input::placeholder { color: var(--text-secondary); }
        .ai-form input:focus, .ai-form select:focus { border-color: #667eea; }
        .ai-form select { flex: 0 0 auto; cursor: pointer; }
        .btn-primary {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 14px 26px;
            border-radius: 14px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.3);
            white-space: nowrap;
        }
        .btn-primary:hover { transform: translateY(-2px); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .ai-status { margin-top: 14px; font-size: 0.92em; min-height: 1.2em; }
        .ai-status.error { color: #e74c3c; }
        .ai-status.ok { color: #2ecc71; }

        .spinner {
            display: inline-block;
            width: 14px; height: 14px;
            border: 2px solid rgba(102,126,234,0.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 일자 탭 */
        .day-tabs { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 24px; }
        .day-tab {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 12px 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 110px;
        }
        .day-tab:hover { transform: translateY(-2px); }
        .day-tab.active { background: var(--accent); color: #fff; border-color: transparent; }
        .day-tab .d-num { font-weight: 700; font-size: 1.05em; }
        .day-tab .d-label { font-size: 0.82em; opacity: 0.85; }
        .day-tab .d-date { font-size: 0.75em; opacity: 0.7; }

        /* 일정 카드 */
        .timeline { display: flex; flex-direction: column; gap: 16px; }
        .empty {
            text-align: center; color: var(--text-secondary);
            padding: 50px 20px;
            background: var(--card-bg);
            border: 1px dashed var(--card-border);
            border-radius: 20px;
        }
        .card {
            display: flex; gap: 16px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 16px;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: all 0.3s ease;
            overflow: hidden;
        }
        .card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(102,126,234,0.18); }
        .card-thumb {
            flex: 0 0 110px;
            width: 110px; height: 110px;
            border-radius: 14px;
            object-fit: cover;
            background: var(--accent);
        }
        .card-body { flex: 1; min-width: 0; }
        .card-top { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; flex-wrap: wrap; }
        .card-time {
            font-weight: 700; color: #667eea;
            background: rgba(102,126,234,0.12);
            padding: 3px 10px; border-radius: 50px; font-size: 0.85em;
        }
        .badge {
            font-size: 0.75em; padding: 3px 10px;
            border-radius: 50px; background: rgba(118,75,162,0.15); color: #764ba2;
        }
        html.dark-mode .badge { color: #b39ddb; }
        .card h3 { font-size: 1.15em; margin-bottom: 4px; }
        .card .desc {
            color: var(--text-secondary); font-size: 0.92em; line-height: 1.45;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        .card .quick { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 12px; font-size: 0.82em; color: var(--text-secondary); }

        @media (max-width: 600px) {
            .card-thumb { flex-basis: 80px; width: 80px; height: 80px; }
            .header h1 { font-size: 1.7em; }
        }

        /* 모달 */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center; justify-content: center;
            z-index: 1000; padding: 20px;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: var(--bg-primary);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            max-width: 560px; width: 100%;
            max-height: 88vh; overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            animation: pop 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes pop { from { transform: scale(0.92); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-hero { position: relative; }
        .modal-hero img {
            width: 100%; height: 220px; object-fit: cover;
            border-radius: 24px 24px 0 0; background: var(--accent); display: block;
        }
        .modal-close {
            position: absolute; top: 14px; right: 14px;
            background: rgba(0,0,0,0.45); color: #fff;
            border: none; width: 36px; height: 36px; border-radius: 50%;
            font-size: 1.2em; cursor: pointer;
        }
        .modal-content { padding: 22px 24px 28px; }
        .modal-content h2 { font-size: 1.5em; margin-bottom: 4px; }
        .modal-content .sub { color: var(--text-secondary); margin-bottom: 18px; font-size: 0.95em; }
        .info-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        @media (min-width: 480px) { .info-grid { grid-template-columns: 1fr 1fr; } }
        .info-item {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 14px; padding: 12px 14px;
        }
        .info-item .label { font-size: 0.78em; color: var(--text-secondary); margin-bottom: 3px; }
        .info-item .value { font-size: 0.95em; line-height: 1.4; }
        .info-item.full { grid-column: 1 / -1; }
        .sources { margin-top: 16px; font-size: 0.85em; }
        .sources a { color: #667eea; display: block; margin-top: 4px; word-break: break-all; }
        .disclaimer {
            margin-top: 18px; font-size: 0.8em; color: var(--text-secondary);
            background: rgba(243, 156, 18, 0.1); border: 1px solid rgba(243,156,18,0.25);
            padding: 10px 12px; border-radius: 12px;
        }
        .modal-actions { margin-top: 18px; display: flex; justify-content: flex-end; }
        .btn-danger {
            background: transparent; color: #e74c3c;
            border: 1px solid rgba(231,76,60,0.4);
            padding: 8px 16px; border-radius: 12px; cursor: pointer; font-size: 0.9em;
        }
        .btn-danger:hover { background: rgba(231,76,60,0.1); }
    </style>
</head>
<body>
<script>requireAuth();</script>
    <button class="theme-toggle" id="themeToggle" title="테마 전환">🌙</button>

    <div class="wrap">
        <nav class="topnav">
            <a href="index.html">🏠 홈</a>
            <a href="dashboard.html">📊 대시보드</a>
            <a href="chart.html">📈 매출분석</a>
            <a href="travel.html" class="active">🧳 여행일정</a>
        </nav>

        <div class="header">
            <h1 id="tripTitle">여행 일정 총정리</h1>
            <p id="tripSubtitle">불러오는 중…</p>
        </div>

        <!-- AI 조사 패널 -->
        <section class="ai-panel">
            <h2>🤖 AI로 여행지 추가하기</h2>
            <p class="hint">여행지나 음식점 이름을 입력하고 며칠차에 넣을지 고르면, AI가 사진·운영시간·비용·가는 방법·교통비용·정보를 한 번에 조사해 정리합니다.</p>
            <div class="ai-form">
                <input type="text" id="queryInput" placeholder="예) 우미노나카미치 해변공원, 이치란 라멘 본점 …" />
                <select id="daySelect"></select>
                <button class="btn-primary" id="researchBtn">조사해서 추가</button>
            </div>
            <div class="ai-status" id="aiStatus"></div>
        </section>

        <!-- 일자 탭 -->
        <div class="day-tabs" id="dayTabs"></div>

        <!-- 일정 타임라인 -->
        <div class="timeline" id="timeline"></div>
    </div>

    <!-- 상세 모달 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modal"></div>
    </div>

    <script>
        // ===== 테마 =====
        const themeToggle = document.getElementById('themeToggle');
        const htmlEl = document.documentElement;
        function initTheme() {
            const saved = localStorage.getItem('theme') || 'light';
            if (saved === 'dark') { htmlEl.classList.add('dark-mode'); themeToggle.textContent = '☀️'; }
            else { htmlEl.classList.remove('dark-mode'); themeToggle.textContent = '🌙'; }
        }
        themeToggle.addEventListener('click', () => {
            htmlEl.classList.toggle('dark-mode');
            const isDark = htmlEl.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            themeToggle.textContent = isDark ? '☀️' : '🌙';
        });
        initTheme();

        // ===== 상태 =====
        let plan = null;
        let activeDay = 1;

        // 키워드 기반 이미지 URL (별도 API 키 불필요)
        function imageUrl(item) {
            const kw = (item.imageKeyword || item.name || 'travel').trim();
            return 'https://loremflickr.com/800/500/' + encodeURIComponent(kw.replace(/\s+/g, ',')) + '/all';
        }
        function fallbackThumb(imgEl) {
            imgEl.onerror = null;
            imgEl.removeAttribute('src');
            imgEl.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
        }

        // ===== 데이터 로드 =====
        async function loadPlan() {
            // 1) 서버 API 우선, 2) 실패 시 정적 JSON 파일
            try {
                const r = await fetch('/api/travel-plan', { cache: 'no-store' });
                if (r.ok) return await r.json();
            } catch (e) {}
            const r2 = await fetch('./travel-plan.json', { cache: 'no-store' });
            return await r2.json();
        }

        function getDay(n) { return plan.days.find(d => d.day === n); }

        function render() {
            document.getElementById('tripTitle').textContent = plan.title || '여행 일정 총정리';
            document.getElementById('tripSubtitle').textContent = plan.subtitle || '';

            // 일자 탭
            const tabs = document.getElementById('dayTabs');
            tabs.innerHTML = '';
            plan.days.forEach(d => {
                const el = document.createElement('div');
                el.className = 'day-tab' + (d.day === activeDay ? ' active' : '');
                el.innerHTML = `<div class="d-num">Day ${d.day}</div>
                                <div class="d-label">${d.label || ''}</div>
                                <div class="d-date">${d.date || ''}</div>`;
                el.onclick = () => { activeDay = d.day; render(); };
                tabs.appendChild(el);
            });

            // 일자 선택 드롭다운
            const sel = document.getElementById('daySelect');
            sel.innerHTML = plan.days.map(d => `<option value="${d.day}">Day ${d.day} (${d.date || ''})</option>`).join('');
            sel.value = activeDay;

            // 타임라인
            const tl = document.getElementById('timeline');
            const day = getDay(activeDay);
            const items = (day.items || []).slice().sort((a, b) => (a.time || '').localeCompare(b.time || ''));
            if (items.length === 0) {
                tl.innerHTML = `<div class="empty">아직 이 날의 일정이 없어요.<br>위에서 여행지를 검색해 AI로 추가해보세요 ✈️</div>`;
                return;
            }
            tl.innerHTML = '';
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img class="card-thumb" alt="${item.name}" src="${imageUrl(item)}">
                    <div class="card-body">
                        <div class="card-top">
                            ${item.time ? `<span class="card-time">${item.time}</span>` : ''}
                            ${item.category ? `<span class="badge">${item.category}</span>` : ''}
                        </div>
                        <h3>${item.name}</h3>
                        <p class="desc">${item.summary || ''}</p>
                        <div class="quick">
                            ${item.openingHours ? `<span>🏪 ${item.openingHours}</span>` : ''}
                            ${item.cost ? `<span>💰 ${item.cost}</span>` : ''}
                        </div>
                    </div>`;
                card.querySelector('img').onerror = function () { fallbackThumb(this); };
                card.onclick = () => openModal(item);
                tl.appendChild(card);
            });
        }

        // ===== 모달 =====
        const overlay = document.getElementById('modalOverlay');
        function infoItem(label, value, full) {
            if (!value) return '';
            return `<div class="info-item${full ? ' full' : ''}"><div class="label">${label}</div><div class="value">${value}</div></div>`;
        }
        function openModal(item) {
            const modal = document.getElementById('modal');
            const sources = (item.sources || []).filter(Boolean);
            modal.innerHTML = `
                <div class="modal-hero">
                    <img alt="${item.name}" src="${imageUrl(item)}">
                    <button class="modal-close" id="modalClose">×</button>
                </div>
                <div class="modal-content">
                    <h2>${item.name}</h2>
                    <div class="sub">${item.category || ''} ${item.time ? '· ' + item.time : ''}</div>
                    ${item.summary ? `<p style="line-height:1.55;margin-bottom:18px;color:var(--text-secondary)">${item.summary}</p>` : ''}
                    <div class="info-grid">
                        ${infoItem('🕒 방문 추천 시간', item.bestVisitTime)}
                        ${infoItem('🏪 영업시간', item.openingHours)}
                        ${infoItem('💰 이용 비용', item.cost)}
                        ${infoItem('🎫 교통비용', item.transportCost)}
                        ${infoItem('🚇 가는 방법', item.howToGet, true)}
                        ${infoItem('📍 위치', item.location, true)}
                    </div>
                    ${sources.length ? `<div class="sources">🔗 출처${sources.map(s => `<a href="${s}" target="_blank" rel="noopener">${s}</a>`).join('')}</div>` : ''}
                    <div class="disclaimer">⚠️ AI가 조사한 정보입니다. 영업시간·비용은 변동될 수 있으니 방문 전 다시 확인하세요.</div>
                    <div class="modal-actions">
                        <button class="btn-danger" id="deleteBtn">이 일정 삭제</button>
                    </div>
                </div>`;
            modal.querySelector('img').onerror = function () { fallbackThumb(this); };
            document.getElementById('modalClose').onclick = closeModal;
            document.getElementById('deleteBtn').onclick = () => deleteItem(item);
            overlay.classList.add('open');
        }
        function closeModal() { overlay.classList.remove('open'); }
        overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

        // ===== AI 조사 추가 =====
        const statusEl = document.getElementById('aiStatus');
        function setStatus(msg, cls) {
            statusEl.className = 'ai-status' + (cls ? ' ' + cls : '');
            statusEl.innerHTML = msg;
        }

        async function research() {
            const query = document.getElementById('queryInput').value.trim();
            const day = parseInt(document.getElementById('daySelect').value, 10);
            if (!query) { setStatus('여행지나 음식점 이름을 입력해주세요.', 'error'); return; }

            const btn = document.getElementById('researchBtn');
            btn.disabled = true;
            setStatus('<span class="spinner"></span>AI가 정보를 조사하는 중이에요…');

            try {
                const r = await fetch('/api/travel-research', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, day })
                });
                if (!r.ok) {
                    const err = await r.json().catch(() => ({}));
                    throw new Error(err.error || ('요청 실패 (' + r.status + ')'));
                }
                const data = await r.json();
                plan = data.plan;
                activeDay = day;
                document.getElementById('queryInput').value = '';
                render();
                setStatus(`✅ "${data.item.name}" 일정이 Day ${day}에 추가됐어요!`, 'ok');
            } catch (e) {
                setStatus('❌ ' + e.message + ' (AI 추가는 서버 실행이 필요합니다)', 'error');
            } finally {
                btn.disabled = false;
            }
        }
        document.getElementById('researchBtn').addEventListener('click', research);
        document.getElementById('queryInput').addEventListener('keydown', e => { if (e.key === 'Enter') research(); });

        // ===== 삭제 =====
        async function deleteItem(item) {
            if (!confirm(`"${item.name}" 일정을 삭제할까요?`)) return;
            try {
                const r = await fetch('/api/travel-item?day=' + activeDay + '&id=' + encodeURIComponent(item.id), { method: 'DELETE' });
                if (r.ok) { plan = (await r.json()).plan; }
                else throw new Error();
            } catch (e) {
                // 서버 없이 보기 모드면 화면에서만 제거
                const day = getDay(activeDay);
                day.items = day.items.filter(i => i.id !== item.id);
            }
            closeModal();
            render();
        }

        // ===== 시작 =====
        (async () => {
            try {
                plan = await loadPlan();
                if (plan.days && plan.days.length) activeDay = plan.days[0].day;
                render();
            } catch (e) {
                document.getElementById('tripSubtitle').textContent = '일정을 불러오지 못했습니다.';
            }
        })();
    </script>
</body>
</html>
