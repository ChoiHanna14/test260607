<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>매출 데이터 분석 - 김비서</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f5;
            --card-bg: rgba(255, 255, 255, 0.7);
            --card-border: rgba(255, 255, 255, 0.3);
            --text-primary: #1a1a2e;
            --text-secondary: #666666;
            --accent: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            --chart-blue: #3b82f6;
            --chart-green: #10b981;
            --chart-light-blue: #60a5fa;
            --chart-light-green: #34d399;
        }

        html.dark-mode {
            --bg-primary: #0f0f23;
            --bg-secondary: #1a1a3e;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-primary: #e0e0e0;
            --text-secondary: #b0b0b0;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            padding: 40px 20px;
            color: var(--text-primary);
            transition: background 0.3s ease;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(102, 126, 234, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(118, 75, 162, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(10px);
            padding: 10px 15px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.3em;
            transition: all 0.3s ease;
            z-index: 100;
            box-shadow: var(--shadow);
        }

        .theme-toggle:hover {
            transform: scale(1.1);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            gap: 20px;
            flex-wrap: wrap;
        }

        .header h1 {
            font-size: 2.5em;
            background: var(--accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
        }

        .nav-links {
            display: flex;
            gap: 15px;
        }

        .nav-link {
            color: var(--text-primary);
            text-decoration: none;
            padding: 10px 20px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 50px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            font-size: 0.9em;
        }

        .nav-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.2);
        }

        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .chart-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }

        .chart-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(102, 126, 234, 0.15);
        }

        .chart-card h2 {
            font-size: 1.4em;
            color: var(--text-primary);
            margin-bottom: 25px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--card-border);
        }

        canvas {
            width: 100%;
            height: auto;
            display: block;
        }

        .summary-table {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: var(--shadow);
            overflow-x: auto;
        }

        .summary-table h2 {
            font-size: 1.4em;
            color: var(--text-primary);
            margin-bottom: 25px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--card-border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: rgba(102, 126, 234, 0.1);
        }

        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: var(--text-primary);
            border-bottom: 2px solid var(--card-border);
            font-size: 0.95em;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid var(--card-border);
            color: var(--text-secondary);
        }

        tr:hover {
            background: rgba(102, 126, 234, 0.05);
        }

        .amount {
            font-weight: 600;
            color: var(--text-primary);
            font-family: 'Monaco', 'Courier New', monospace;
        }

        .legend {
            display: flex;
            gap: 30px;
            margin-top: 20px;
            flex-wrap: wrap;
            font-size: 0.95em;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .legend-box {
            width: 16px;
            height: 16px;
            border-radius: 3px;
        }

        @media (max-width: 1024px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 0;
            }

            .header h1 {
                font-size: 2em;
            }

            .chart-card,
            .summary-table {
                padding: 20px;
            }

            th, td {
                padding: 10px;
                font-size: 0.9em;
            }

            .legend {
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle" title="테마 전환">🌙</button>

    <div class="container">
        <div class="header">
            <h1>📊 매출 데이터 분석</h1>
            <div class="nav-links">
                <a class="nav-link" href="index.html">← 메인</a>
                <a class="nav-link" href="dashboard.html">대시보드</a>
            </div>
        </div>

        <div class="charts-grid">
            <div class="chart-card">
                <h2>📈 월별 매출 추이</h2>
                <canvas id="lineChart" width="400" height="250"></canvas>
                <div class="legend">
                    <div class="legend-item">
                        <div class="legend-box" style="background-color: #3b82f6;"></div>
                        <span>월별 매출</span>
                    </div>
                </div>
            </div>

            <div class="chart-card">
                <h2>🎯 제품별 매출 비교</h2>
                <canvas id="barChart" width="400" height="250"></canvas>
                <div class="legend">
                    <div class="legend-item">
                        <div class="legend-box" style="background-color: #10b981;"></div>
                        <span>제품별 총 매출</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="summary-table">
            <h2>💰 상세 요약</h2>
            <table>
                <thead>
                    <tr>
                        <th>항목</th>
                        <th style="text-align: right;">금액</th>
                    </tr>
                </thead>
                <tbody id="summaryTable"></tbody>
            </table>
        </div>
    </div>

    <script>
        const html = document.documentElement;
        const themeToggle = document.getElementById('themeToggle');

        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            if (savedTheme === 'dark') {
                html.classList.add('dark-mode');
                themeToggle.textContent = '☀️';
            } else {
                html.classList.remove('dark-mode');
                themeToggle.textContent = '🌙';
            }
        }

        themeToggle.addEventListener('click', () => {
            html.classList.toggle('dark-mode');
            const isDark = html.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            themeToggle.textContent = isDark ? '☀️' : '🌙';
        });

        // 데이터 처리
        const data = [
            { date: '2026-01-05', product: '무선 이어폰', amount: 4005000 },
            { date: '2026-01-05', product: '보조배터리', amount: 1120000 },
            { date: '2026-01-05', product: '텀블러', amount: 1950000 },
            { date: '2026-01-08', product: '무선 이어폰', amount: 4628000 },
            { date: '2026-01-08', product: '블루투스 스피커', amount: 2160000 },
            { date: '2026-01-08', product: '텀블러', amount: 1625000 },
            { date: '2026-01-12', product: '보조배터리', amount: 1435000 },
            { date: '2026-01-12', product: '무선 충전기', amount: 1305000 },
            { date: '2026-01-12', product: '에코백', amount: 1395000 },
            { date: '2026-01-15', product: '무선 이어폰', amount: 3382000 },
            { date: '2026-01-15', product: '블루투스 스피커', amount: 2640000 },
            { date: '2026-01-15', product: '텀블러', amount: 2100000 },
            { date: '2026-01-19', product: '보조배터리', amount: 1925000 },
            { date: '2026-01-19', product: '에코백', amount: 1650000 },
            { date: '2026-01-19', product: '무선 충전기', amount: 1485000 },
            { date: '2026-01-22', product: '무선 이어폰', amount: 5429000 },
            { date: '2026-01-22', product: '텀블러', amount: 1800000 },
            { date: '2026-01-22', product: '블루투스 스피커', amount: 1800000 },
            { date: '2026-01-26', product: '보조배터리', amount: 1680000 },
            { date: '2026-01-26', product: '에코백', amount: 1320000 },
            { date: '2026-01-26', product: '무선 충전기', amount: 1665000 },
            { date: '2026-02-01', product: '무선 이어폰', amount: 6230000 },
            { date: '2026-02-01', product: '텀블러', amount: 2375000 },
            { date: '2026-02-01', product: '보조배터리', amount: 1505000 },
            { date: '2026-02-05', product: '블루투스 스피커', amount: 3000000 },
            { date: '2026-02-05', product: '에코백', amount: 1800000 },
            { date: '2026-02-05', product: '무선 충전기', amount: 1395000 },
            { date: '2026-02-10', product: '무선 이어폰', amount: 5162000 },
            { date: '2026-02-10', product: '텀블러', amount: 1675000 },
            { date: '2026-02-10', product: '보조배터리', amount: 1365000 }
        ];

        // 월별 매출 계산
        function getMonthlyRevenue() {
            const monthly = {};
            data.forEach(item => {
                const month = item.date.substring(0, 7);
                monthly[month] = (monthly[month] || 0) + item.amount;
            });
            return Object.entries(monthly).sort().map(([month, amount]) => ({ month, amount }));
        }

        // 제품별 매출 계산
        function getProductRevenue() {
            const products = {};
            data.forEach(item => {
                products[item.product] = (products[item.product] || 0) + item.amount;
            });
            return Object.entries(products)
                .map(([product, amount]) => ({ product, amount }))
                .sort((a, b) => b.amount - a.amount);
        }

        const monthlyData = getMonthlyRevenue();
        const productData = getProductRevenue();

        // 숫자 포매팅
        function formatNumber(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        }

        // 선 그래프 (월별 매출)
        function drawLineChart() {
            const canvas = document.getElementById('lineChart');
            const ctx = canvas.getContext('2d');
            const rect = canvas.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;

            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr);

            const width = rect.width;
            const height = rect.height;
            const padding = 50;
            const chartWidth = width - padding * 2;
            const chartHeight = height - padding * 2;

            const isDark = html.classList.contains('dark-mode');
            const textColor = isDark ? '#e0e0e0' : '#1a1a2e';
            const gridColor = isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)';

            // 배경
            ctx.fillStyle = isDark ? 'rgba(255,255,255,0.02)' : 'rgba(255,255,255,0.3)';
            ctx.fillRect(padding, padding, chartWidth, chartHeight);

            // 축
            ctx.strokeStyle = gridColor;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(padding, padding);
            ctx.lineTo(padding, height - padding);
            ctx.lineTo(width - padding, height - padding);
            ctx.stroke();

            // Y축 레이블
            ctx.fillStyle = textColor;
            ctx.font = '12px sans-serif';
            ctx.textAlign = 'right';

            const maxAmount = Math.max(...monthlyData.map(d => d.amount));
            const yStep = maxAmount / 4;

            for (let i = 0; i <= 4; i++) {
                const y = height - padding - (chartHeight / 4) * i;
                const value = yStep * i;
                ctx.fillText(formatNumber(Math.round(value / 1000000)) + 'M', padding - 10, y + 5);

                ctx.strokeStyle = gridColor;
                ctx.lineWidth = 0.5;
                ctx.beginPath();
                ctx.moveTo(padding, y);
                ctx.lineTo(width - padding, y);
                ctx.stroke();
            }

            // X축 레이블 및 데이터 포인트
            ctx.fillStyle = '#3b82f6';
            ctx.strokeStyle = '#3b82f6';
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            const xStep = chartWidth / (monthlyData.length - 1 || 1);
            let pathStarted = false;

            monthlyData.forEach((item, idx) => {
                const x = padding + xStep * idx;
                const y = height - padding - (item.amount / maxAmount) * chartHeight;

                // 라인
                if (idx === 0) {
                    ctx.beginPath();
                    ctx.moveTo(x, y);
                    pathStarted = true;
                } else {
                    ctx.lineTo(x, y);
                }

                // 포인트
                ctx.fillRect(x - 4, y - 4, 8, 8);

                // X축 레이블
                ctx.fillStyle = textColor;
                ctx.font = '12px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(item.month, x, height - padding + 20);

                ctx.fillStyle = '#3b82f6';
            });

            if (pathStarted) {
                ctx.stroke();
            }
        }

        // 막대 그래프 (제품별 매출)
        function drawBarChart() {
            const canvas = document.getElementById('barChart');
            const ctx = canvas.getContext('2d');
            const rect = canvas.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;

            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr);

            const width = rect.width;
            const height = rect.height;
            const padding = 50;
            const chartWidth = width - padding * 2;
            const chartHeight = height - padding * 2;

            const isDark = html.classList.contains('dark-mode');
            const textColor = isDark ? '#e0e0e0' : '#1a1a2e';
            const gridColor = isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)';

            // 배경
            ctx.fillStyle = isDark ? 'rgba(255,255,255,0.02)' : 'rgba(255,255,255,0.3)';
            ctx.fillRect(padding, padding, chartWidth, chartHeight);

            // 축
            ctx.strokeStyle = gridColor;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(padding, padding);
            ctx.lineTo(padding, height - padding);
            ctx.lineTo(width - padding, height - padding);
            ctx.stroke();

            // Y축 레이블
            ctx.fillStyle = textColor;
            ctx.font = '12px sans-serif';
            ctx.textAlign = 'right';

            const maxAmount = Math.max(...productData.map(d => d.amount));
            const yStep = maxAmount / 4;

            for (let i = 0; i <= 4; i++) {
                const y = height - padding - (chartHeight / 4) * i;
                const value = yStep * i;
                ctx.fillText(formatNumber(Math.round(value / 1000000)) + 'M', padding - 10, y + 5);

                ctx.strokeStyle = gridColor;
                ctx.lineWidth = 0.5;
                ctx.beginPath();
                ctx.moveTo(padding, y);
                ctx.lineTo(width - padding, y);
                ctx.stroke();
            }

            // 막대
            const barWidth = chartWidth / productData.length * 0.7;
            const barSpacing = chartWidth / productData.length;

            const colors = ['#10b981', '#34d399', '#6ee7b7', '#a7f3d0'];

            productData.forEach((item, idx) => {
                const x = padding + barSpacing * idx + (barSpacing - barWidth) / 2;
                const barHeight = (item.amount / maxAmount) * chartHeight;
                const y = height - padding - barHeight;

                ctx.fillStyle = colors[idx % colors.length];
                ctx.fillRect(x, y, barWidth, barHeight);

                // 상단 값
                ctx.fillStyle = textColor;
                ctx.font = 'bold 12px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(formatNumber(Math.round(item.amount / 1000000)) + 'M', x + barWidth / 2, y - 5);

                // X축 레이블
                ctx.fillStyle = textColor;
                ctx.font = '11px sans-serif';
                ctx.textAlign = 'center';
                const label = item.product.length > 8 ? item.product.substring(0, 8) + '...' : item.product;
                ctx.fillText(label, x + barWidth / 2, height - padding + 20);
            });
        }

        // 요약 테이블
        function renderSummaryTable() {
            const tbody = document.getElementById('summaryTable');
            let html = '';

            // 월별 합계
            monthlyData.forEach(item => {
                html += `<tr>
                    <td>${item.month}</td>
                    <td style="text-align: right;" class="amount">${formatNumber(item.amount)}</td>
                </tr>`;
            });

            // 전체 합계
            const totalAmount = data.reduce((sum, item) => sum + item.amount, 0);
            html += `<tr style="font-weight: 600; background: rgba(102, 126, 234, 0.1);">
                <td>전체 매출</td>
                <td style="text-align: right;" class="amount">${formatNumber(totalAmount)}</td>
            </tr>`;

            // 평균
            const avgAmount = Math.round(totalAmount / data.length);
            html += `<tr>
                <td>평균 거래액</td>
                <td style="text-align: right;" class="amount">${formatNumber(avgAmount)}</td>
            </tr>`;

            tbody.innerHTML = html;
        }

        // 초기화
        initTheme();
        drawLineChart();
        drawBarChart();
        renderSummaryTable();

        // 윈도우 리사이즈 시 차트 다시 그리기
        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                drawLineChart();
                drawBarChart();
            }, 250);
        });
    </script>
</body>
</html>
