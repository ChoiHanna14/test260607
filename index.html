<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#667eea">
    <meta name="description" content="구독, 업무, 매출을 한눈에 관리하는 스마트 대시보드">
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%23667eea' width='192' height='192' rx='45'/><text x='50%' y='50%' font-size='80' font-weight='bold' fill='white' text-anchor='middle' dominant-baseline='middle'>김</text></svg>">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="김비서">
    <title>김비서를 소개합니다</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f5;
            --card-bg: rgba(255, 255, 255, 0.7);
            --card-border: rgba(255, 255, 255, 0.3);
            --text-primary: #1a1a2e;
            --text-secondary: #666666;
            --accent: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --accent-hover: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        html.dark-mode {
            --bg-primary: #0f0f23;
            --bg-secondary: #1a1a3e;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-primary: #e0e0e0;
            --text-secondary: #b0b0b0;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--text-primary);
            transition: background 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(102, 126, 234, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(118, 75, 162, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(10px);
            padding: 10px 15px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.3em;
            transition: all 0.3s ease;
            z-index: 100;
            box-shadow: var(--shadow);
        }

        .theme-toggle:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.2);
        }

        .container {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 60px 40px;
            max-width: 600px;
            box-shadow: var(--shadow);
            text-align: center;
            position: relative;
            z-index: 1;
            transition: all 0.3s ease;
        }

        h1 {
            font-size: 2.5em;
            color: var(--text-primary);
            margin-bottom: 20px;
            font-weight: 700;
            background: var(--accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .intro {
            color: var(--text-secondary);
            font-size: 1.1em;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .features {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 50px;
        }

        .feature {
            background: rgba(255, 255, 255, 0.05);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid var(--card-border);
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        .feature:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.15);
        }

        .feature h3 {
            color: var(--text-primary);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .feature p {
            color: var(--text-secondary);
            font-size: 0.95em;
        }

        .cta-button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 18px 50px;
            font-size: 1.1em;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.3);
            position: relative;
            overflow: hidden;
        }

        .cta-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--accent-hover);
            transition: left 0.3s ease;
            z-index: -1;
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(102, 126, 234, 0.4);
        }

        .cta-button:active {
            transform: translateY(-1px);
        }

        @media (max-width: 768px) {
            .container {
                padding: 40px 25px;
            }

            h1 {
                font-size: 2em;
            }

            .theme-toggle {
                padding: 8px 12px;
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle" title="테마 전환">🌙</button>

    <div class="container">
        <h1>김비서를 소개합니다</h1>

        <p class="intro">
            업무 관리의 번거로움에서 벗어나세요.<br>
            김비서가 당신의 일정, 프로젝트, 성과를 한눈에 정리해드립니다.
        </p>

        <div class="features">
            <div class="feature">
                <h3>📋 스마트한 업무 관리</h3>
                <p>할 일 목록을 우선순위별로 정리하고 진행 상황을 추적합니다.</p>
            </div>
            <div class="feature">
                <h3>📅 일정 및 프로젝트 관리</h3>
                <p>주간 일정과 프로젝트 진행률을 시각적으로 한눈에 파악합니다.</p>
            </div>
            <div class="feature">
                <h3>📊 성과 분석</h3>
                <p>매출 및 성과 지표를 실시간으로 모니터링하고 의사결정을 지원합니다.</p>
            </div>
        </div>

        <button class="cta-button" onclick="window.location.href='dashboard.html'">
            내 대시보드 보기 →
        </button>
    </div>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;

        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            if (savedTheme === 'dark') {
                html.classList.add('dark-mode');
                themeToggle.textContent = '☀️';
            } else {
                html.classList.remove('dark-mode');
                themeToggle.textContent = '🌙';
            }
        }

        themeToggle.addEventListener('click', () => {
            html.classList.toggle('dark-mode');
            const isDark = html.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            themeToggle.textContent = isDark ? '☀️' : '🌙';
        });

        initTheme();

        // Service Worker 등록
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(registration => {
                        console.log('✅ Service Worker 등록 완료:', registration);
                    })
                    .catch(error => {
                        console.error('❌ Service Worker 등록 실패:', error);
                    });
            });
        }

        // PWA 설치 프롬프트
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', event => {
            event.preventDefault();
            deferredPrompt = event;
            console.log('📱 PWA 설치 가능');
        });
    </script>
</body>
</html>
