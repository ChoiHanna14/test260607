<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#667eea" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>번역 기록 - 실시간 번역앱</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="wrap">
    <header class="topbar">
      <h1>📜 번역 기록</h1>
      <button class="theme-toggle" id="themeToggle" title="테마 전환">🌙</button>
    </header>

    <div class="card">
      <div class="btn-row">
        <button class="btn secondary" id="clearBtn">기록 모두 지우기</button>
        <span id="count" class="muted"></span>
      </div>
    </div>

    <div class="card" id="listCard">
      <div id="list"></div>
    </div>
  </div>

  <nav class="bottom">
    <a href="./index.html"><span class="ico">📝</span>번역</a>
    <a href="./screenshot.html"><span class="ico">📷</span>스크린샷</a>
    <a href="./history.html" class="active"><span class="ico">📜</span>기록</a>
    <a href="./settings.html"><span class="ico">⚙️</span>설정</a>
  </nav>

  <script src="./app.js"></script>
  <script>
    const list = document.getElementById('list');
    const count = document.getElementById('count');

    function fmt(ts) {
      const d = new Date(ts);
      return d.toLocaleString('ko-KR', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    }
    function escapeHtml(s) {
      return (s || '').replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
    }

    function render() {
      const items = history_load();
      count.textContent = items.length + '개';
      if (!items.length) {
        list.innerHTML = '<div class="muted">아직 번역 기록이 없어요.</div>';
        return;
      }
      list.innerHTML = '';
      items.forEach((it) => {
        const div = document.createElement('div');
        div.className = 'history-item';
        div.innerHTML =
          '<div class="result-ko" style="font-size:1.02em">' + escapeHtml(it.translation) + '</div>' +
          '<div class="history-meta">' + escapeHtml(it.original) + ' · ' + fmt(it.at) + '</div>';
        div.style.cursor = 'pointer';
        div.addEventListener('click', () => copyText(it.translation));
        list.appendChild(div);
      });
    }

    document.getElementById('clearBtn').addEventListener('click', () => {
      if (confirm('번역 기록을 모두 지울까요?')) {
        history_clear();
        render();
        showToast('기록을 지웠어요');
      }
    });

    render();
  </script>
</body>
</html>
