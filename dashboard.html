<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#667eea">
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%23667eea' width='192' height='192' rx='45'/><text x='50%' y='50%' font-size='80' font-weight='bold' fill='white' text-anchor='middle' dominant-baseline='middle'>김</text></svg>">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="김비서">
    <title>업무 대시보드 - 김비서</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f5;
            --card-bg: rgba(255, 255, 255, 0.7);
            --card-border: rgba(255, 255, 255, 0.3);
            --text-primary: #1a1a2e;
            --text-secondary: #666666;
            --accent: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --accent-hover: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        html.dark-mode {
            --bg-primary: #0f0f23;
            --bg-secondary: #1a1a3e;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-primary: #e0e0e0;
            --text-secondary: #b0b0b0;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            padding: 40px 20px;
            color: var(--text-primary);
            transition: background 0.3s ease;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* 태블릿 이상 (768px 이상) */
        @media (min-width: 768px) {
            body {
                padding: 40px 30px;
            }
        }

        /* 데스크톱 (1024px 이상) */
        @media (min-width: 1024px) {
            body {
                padding: 40px 40px;
            }
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(102, 126, 234, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(118, 75, 162, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .theme-toggle {
            position: fixed;
            top: 15px;
            right: 15px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(10px);
            padding: 8px 12px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.2em;
            transition: all 0.3s ease;
            z-index: 100;
            box-shadow: var(--shadow);
        }

        @media (min-width: 768px) {
            .theme-toggle {
                top: 20px;
                right: 20px;
                padding: 10px 15px;
                font-size: 1.3em;
            }
        }

        .theme-toggle:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.2);
        }

        .header {
            max-width: 1200px;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 1;
            flex-direction: column;
            gap: 15px;
        }

        .header h1 {
            font-size: 1.8em;
            background: var(--accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
            width: 100%;
            text-align: center;
        }

        /* 태블릿 이상 */
        @media (min-width: 768px) {
            .header {
                flex-direction: row;
                margin-bottom: 35px;
                gap: 0;
            }

            .header h1 {
                font-size: 2.2em;
                text-align: left;
            }
        }

        /* 데스크톱 */
        @media (min-width: 1024px) {
            .header {
                margin-bottom: 40px;
            }

            .header h1 {
                font-size: 2.5em;
            }
        }

        .back-link {
            color: var(--text-primary);
            text-decoration: none;
            font-size: 0.9em;
            padding: 10px 18px;
            border-radius: 50px;
            transition: all 0.3s ease;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(10px);
            box-shadow: var(--shadow);
            white-space: nowrap;
        }

        @media (min-width: 768px) {
            .back-link {
                font-size: 1em;
                padding: 12px 24px;
            }
        }

        .back-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.2);
        }

        .dashboard {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            position: relative;
            z-index: 1;
        }

        /* 태블릿 (768px 이상) */
        @media (min-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
                gap: 25px;
            }
        }

        /* 데스크톱 (1024px 이상) */
        @media (min-width: 1024px) {
            .dashboard {
                grid-template-columns: 1fr 1fr;
                gap: 30px;
            }
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }

        /* 태블릿 */
        @media (min-width: 768px) {
            .card {
                border-radius: 25px;
                padding: 25px;
            }
        }

        /* 데스크톱 */
        @media (min-width: 1024px) {
            .card {
                padding: 30px;
            }
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(102, 126, 234, 0.15);
            background: rgba(255, 255, 255, 0.08);
        }

        .card.full {
            grid-column: 1 / -1;
        }

        .card h2 {
            font-size: 1.1em;
            color: var(--text-primary);
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--card-border);
            font-weight: 600;
        }

        @media (min-width: 768px) {
            .card h2 {
                font-size: 1.2em;
                margin-bottom: 22px;
                padding-bottom: 15px;
            }
        }

        @media (min-width: 1024px) {
            .card h2 {
                font-size: 1.3em;
                margin-bottom: 25px;
                padding-bottom: 15px;
            }
        }

        /* 할 일 목록 */
        .todo-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .todo-item {
            display: flex;
            align-items: flex-start;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            gap: 10px;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        @media (min-width: 768px) {
            .todo-item {
                padding: 15px;
                border-radius: 15px;
                gap: 12px;
            }
        }

        .todo-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(5px);
        }

        .todo-item input[type="checkbox"] {
            margin-top: 4px;
            cursor: pointer;
            width: 18px;
            height: 18px;
            accent-color: #667eea;
        }

        .todo-item input[type="checkbox"]:checked + .todo-content {
            opacity: 0.6;
        }

        .todo-item input[type="checkbox"]:checked + .todo-content .todo-text {
            text-decoration: line-through;
        }

        .todo-content {
            flex: 1;
        }

        .todo-text {
            color: var(--text-primary);
            font-weight: 500;
            margin-bottom: 4px;
        }

        .todo-meta {
            display: flex;
            gap: 8px;
            font-size: 0.85em;
        }

        .priority {
            padding: 4px 10px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9em;
        }

        .priority.high {
            background: rgba(211, 47, 47, 0.2);
            color: #ff6b6b;
            border: 1px solid rgba(211, 47, 47, 0.3);
        }

        .priority.medium {
            background: rgba(245, 124, 0, 0.2);
            color: #ff9800;
            border: 1px solid rgba(245, 124, 0, 0.3);
        }

        .priority.low {
            background: rgba(56, 142, 60, 0.2);
            color: #66bb6a;
            border: 1px solid rgba(56, 142, 60, 0.3);
        }

        .status {
            padding: 4px 10px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9em;
            background: rgba(102, 126, 234, 0.2);
            color: #667eea;
            border: 1px solid rgba(102, 126, 234, 0.3);
        }

        /* 주간 일정 */
        .schedule-table {
            width: 100%;
            border-collapse: collapse;
        }

        .schedule-table th {
            background: rgba(102, 126, 234, 0.1);
            padding: 10px;
            text-align: left;
            font-weight: 600;
            color: var(--text-primary);
            border-bottom: 1px solid var(--card-border);
            font-size: 0.9em;
        }

        @media (min-width: 768px) {
            .schedule-table th {
                padding: 12px;
                font-size: 0.95em;
            }
        }

        .schedule-table td {
            padding: 10px;
            border-bottom: 1px solid var(--card-border);
            color: var(--text-secondary);
            font-size: 0.85em;
        }

        @media (min-width: 768px) {
            .schedule-table td {
                padding: 12px;
                font-size: 0.95em;
            }
        }

        .day {
            font-weight: 600;
            color: var(--text-primary);
            min-width: 50px;
        }

        @media (min-width: 768px) {
            .day {
                min-width: 60px;
            }
        }

        /* 프로젝트 진행률 */
        .project-item {
            margin-bottom: 15px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        @media (min-width: 768px) {
            .project-item {
                margin-bottom: 18px;
                padding: 15px;
                border-radius: 15px;
            }
        }

        .project-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(5px);
        }

        .project-name {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            color: var(--text-primary);
            font-weight: 500;
        }

        .project-progress {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .progress-bar {
            flex: 1;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid var(--card-border);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .progress-percent {
            font-size: 0.9em;
            color: var(--text-secondary);
            font-weight: 600;
            min-width: 35px;
            text-align: right;
        }

        /* 매출 요약 */
        .metrics {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        @media (min-width: 768px) {
            .metrics {
                grid-template-columns: 1fr 1fr;
                gap: 18px;
            }
        }

        .metric-card {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.8) 0%, rgba(118, 75, 162, 0.8) 100%);
            color: white;
            padding: 20px;
            border-radius: 18px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.2);
            transition: all 0.3s ease;
        }

        @media (min-width: 768px) {
            .metric-card {
                padding: 25px;
                border-radius: 20px;
            }
        }

        .metric-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 32px rgba(102, 126, 234, 0.3);
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.9) 0%, rgba(118, 75, 162, 0.9) 100%);
        }

        .metric-label {
            font-size: 0.9em;
            opacity: 0.95;
            margin-bottom: 8px;
            font-weight: 500;
        }

        @media (min-width: 768px) {
            .metric-label {
                font-size: 0.95em;
                margin-bottom: 10px;
            }
        }

        .metric-value {
            font-size: 1.6em;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        @media (min-width: 768px) {
            .metric-value {
                font-size: 2em;
            }
        }

        /* 회의록 분석 카드 */
        .meeting-card {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.08) 0%, rgba(5, 150, 105, 0.08) 100%);
            border: 1px solid rgba(16, 185, 129, 0.25);
        }

        .meeting-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .meeting-header h2 { margin: 0; }

        .meeting-meta {
            font-size: 0.8em;
            color: var(--text-secondary);
        }

        .meeting-content {
            color: var(--text-primary);
            line-height: 1.8;
            font-size: 0.95em;
        }

        /* 마크다운 테이블 스타일 */
        .meeting-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 12px 0;
            font-size: 0.9em;
        }

        .meeting-content th {
            background: rgba(16, 185, 129, 0.15);
            padding: 10px 12px;
            text-align: left;
            font-weight: 600;
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: var(--text-primary);
        }

        .meeting-content td {
            padding: 9px 12px;
            border: 1px solid var(--card-border);
            color: var(--text-secondary);
            vertical-align: top;
        }

        .meeting-content tr:hover td {
            background: rgba(16, 185, 129, 0.05);
        }

        .meeting-content h3 {
            font-size: 1em;
            color: #10b981;
            margin: 18px 0 10px;
        }

        .meeting-content ul, .meeting-content ol {
            padding-left: 20px;
            margin: 8px 0;
        }

        .meeting-content li {
            margin-bottom: 5px;
            color: var(--text-secondary);
        }

        .meeting-content strong { color: var(--text-primary); }

        .meeting-empty {
            color: var(--text-secondary);
            font-size: 0.95em;
            line-height: 1.7;
            background: rgba(16, 185, 129, 0.06);
            padding: 16px 20px;
            border-radius: 12px;
            border: 1px dashed rgba(16, 185, 129, 0.3);
        }

        .meeting-empty code {
            background: rgba(16, 185, 129, 0.15);
            padding: 2px 8px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 0.9em;
            color: #10b981;
        }

        .btn-meeting {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.85em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .btn-meeting:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(16, 185, 129, 0.4);
        }

        .btn-meeting:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* AI 브리핑 카드 */
        .briefing-card {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.12) 0%, rgba(118, 75, 162, 0.12) 100%);
            border: 1px solid rgba(102, 126, 234, 0.3);
        }

        .briefing-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .briefing-header h2 {
            margin: 0;
        }

        .briefing-meta {
            font-size: 0.8em;
            color: var(--text-secondary);
        }

        .briefing-content {
            color: var(--text-primary);
            line-height: 1.8;
            white-space: pre-wrap;
            font-size: 0.95em;
        }

        .briefing-empty {
            color: var(--text-secondary);
            font-size: 0.95em;
            line-height: 1.7;
            background: rgba(102, 126, 234, 0.06);
            padding: 16px 20px;
            border-radius: 12px;
            border: 1px dashed rgba(102, 126, 234, 0.3);
        }

        .briefing-empty code {
            background: rgba(102, 126, 234, 0.15);
            padding: 2px 8px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 0.9em;
            color: #667eea;
        }

        .btn-rebriefing {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.85em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .btn-rebriefing:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(102, 126, 234, 0.4);
        }

        .btn-rebriefing:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* 네비게이션 메뉴 */
        .dashboard-nav {
            display: flex;
            gap: 8px;
            margin-bottom: 25px;
            padding: 12px 15px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            flex-wrap: wrap;
            position: relative;
            z-index: 1;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .nav-item {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 8px 14px;
            border-radius: 10px;
            transition: all 0.3s ease;
            font-weight: 500;
            font-size: 0.85em;
            position: relative;
            border-bottom: 2px solid transparent;
            white-space: nowrap;
            flex-shrink: 0;
        }

        /* 태블릿 */
        @media (min-width: 768px) {
            .dashboard-nav {
                gap: 10px;
                padding: 15px 20px;
                margin-bottom: 30px;
            }

            .nav-item {
                font-size: 0.95em;
                padding: 10px 20px;
            }
        }

        .nav-item:hover {
            color: var(--text-primary);
            background: rgba(102, 126, 234, 0.08);
        }

        .nav-item.active {
            color: #667eea;
            background: rgba(102, 126, 234, 0.15);
            border-bottom-color: #667eea;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }

            .metrics {
                grid-template-columns: 1fr;
            }

            .header {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }

            .header h1 {
                font-size: 2em;
            }

            .theme-toggle {
                padding: 8px 12px;
                font-size: 1.1em;
            }

            .dashboard-nav {
                gap: 8px;
                padding: 12px 15px;
            }

            .nav-item {
                padding: 8px 16px;
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle" title="테마 전환">🌙</button>

    <div class="header">
        <h1>업무 대시보드</h1>
        <a class="back-link" href="index.html">← 메인으로 돌아가기</a>
    </div>

    <nav class="dashboard-nav">
        <a href="dashboard.html" class="nav-item active">📊 대시보드</a>
        <a href="meeting-result.html" class="nav-item">📋 회의록</a>
        <a href="chart.html" class="nav-item">📈 매출 현황</a>
        <a href="diagram.html" class="nav-item">🔄 업무 프로세스</a>
        <a href="report.html" class="nav-item">📝 사이트 분석</a>
    </nav>

    <div class="dashboard">
        <!-- 0. 회의록 분석 -->
        <div class="card meeting-card">
            <div class="meeting-header">
                <h2>📝 회의록 분석</h2>
                <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
                    <span class="meeting-meta" id="meetingUpdatedAt"></span>
                    <button class="btn-meeting" id="btnMeeting">🔄 다시 분석</button>
                </div>
            </div>
            <div id="meetingContent"></div>
        </div>

        <!-- 0. AI 아침 브리핑 -->
        <div class="card briefing-card">
            <div class="briefing-header">
                <h2>🤖 AI 아침 브리핑</h2>
                <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
                    <span class="briefing-meta" id="briefingUpdatedAt"></span>
                    <button class="btn-rebriefing" id="btnRebriefing" title="브리핑을 새로 생성하려면 터미널에서 npm run brief 실행">🔄 다시 브리핑</button>
                </div>
            </div>
            <div id="briefingContent"></div>
        </div>

        <!-- 1. 할 일 목록 -->
        <div class="card">
            <h2>📋 할 일 목록</h2>
            <div class="todo-list" id="todoList"></div>
        </div>

        <!-- 2. 이번 주 일정 -->
        <div class="card">
            <h2>📅 이번 주 일정</h2>
            <table class="schedule-table">
                <thead>
                    <tr>
                        <th>요일</th>
                        <th>일정</th>
                    </tr>
                </thead>
                <tbody id="scheduleTable"></tbody>
            </table>
        </div>

        <!-- 3. 프로젝트 진행률 -->
        <div class="card">
            <h2>🎯 프로젝트 진행률</h2>
            <div id="projectsList"></div>
        </div>

        <!-- 4. 매출 요약 -->
        <div class="card">
            <h2>💰 매출 요약</h2>
            <div class="metrics" id="metrics"></div>
        </div>
    </div>

    <script>
        const html = document.documentElement;
        const themeToggle = document.getElementById('themeToggle');

        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            if (savedTheme === 'dark') {
                html.classList.add('dark-mode');
                themeToggle.textContent = '☀️';
            } else {
                html.classList.remove('dark-mode');
                themeToggle.textContent = '🌙';
            }
        }

        themeToggle.addEventListener('click', () => {
            html.classList.toggle('dark-mode');
            const isDark = html.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            themeToggle.textContent = isDark ? '☀️' : '🌙';
        });

        // 데이터
        const todos = [
            { text: "워크숍 후기 작성하기", priority: "높음", status: "대기" },
            { text: "3월 프로모션 기획안 작성", priority: "높음", status: "진행중" },
            { text: "인플루언서 미팅 일정 잡기", priority: "높음", status: "대기" },
            { text: "영상 광고 3개 추가 제작", priority: "보통", status: "진행중" },
            { text: "경쟁사 C사 캠페인 분석", priority: "보통", status: "대기" },
            { text: "4월 신제품 티저 콘텐츠 기획", priority: "높음", status: "대기" },
            { text: "SNS 계정 주간 콘텐츠 업로드", priority: "보통", status: "완료" },
            { text: "블로그 포스트 2건 작성", priority: "낮음", status: "대기" },
            { text: "고객 설문조사 결과 분석", priority: "보통", status: "진행중" }
        ];

        const schedule = {
            "월": ["10:00 마케팅팀 주간회의", "14:00 신제품 런칭 킥오프 미팅"],
            "화": ["09:00 3월 프로모션 기획안 마감", "11:00 디자인팀 협업 미팅", "15:00 파트너사 계약서 검토"],
            "수": ["10:00 인플루언서 미팅", "14:00 고객 설문 결과 공유", "16:00 콘텐츠 편집 회의"],
            "목": ["09:30 영상 광고 촬영", "13:00 점심 미팅 — 광고 대행사", "15:00 SNS 콘텐츠 리뷰"],
            "금": ["10:00 유튜브 채널 리뉴얼 최종 검토", "14:00 주간 성과 리뷰", "16:00 다음 주 콘텐츠 캘린더 확정"]
        };

        const projects = [
            { name: "봄맞이 프로모션", progress: 65 },
            { name: "신제품 런칭 캠페인", progress: 20 },
            { name: "인플루언서 협업", progress: 35 },
            { name: "유튜브 채널 리뉴얼", progress: 80 },
            { name: "고객 리텐션 프로그램", progress: 10 },
            { name: "홈페이지 리뉴얼", progress: 45 }
        ];

        // 할 일 목록 렌더링
        function renderTodos() {
            const todoList = document.getElementById("todoList");
            todoList.innerHTML = todos.map((todo, idx) => {
                const priorityClass = {
                    "높음": "high",
                    "보통": "medium",
                    "낮음": "low"
                }[todo.priority];

                return `
                    <div class="todo-item">
                        <input type="checkbox" id="todo-${idx}">
                        <div class="todo-content">
                            <div class="todo-text">${todo.text}</div>
                            <div class="todo-meta">
                                <span class="priority ${priorityClass}">${todo.priority}</span>
                                <span class="status">${todo.status}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join("");
        }

        // 주간 일정 렌더링
        function renderSchedule() {
            const scheduleTable = document.getElementById("scheduleTable");
            scheduleTable.innerHTML = Object.entries(schedule).map(([day, items]) => {
                return `
                    <tr>
                        <td class="day">${day}요일</td>
                        <td>${items.join("<br>")}</td>
                    </tr>
                `;
            }).join("");
        }

        // 프로젝트 진행률 렌더링
        function renderProjects() {
            const projectsList = document.getElementById("projectsList");
            projectsList.innerHTML = projects.map(project => `
                <div class="project-item">
                    <div class="project-name">
                        <span>${project.name}</span>
                    </div>
                    <div class="project-progress">
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${project.progress}%"></div>
                        </div>
                        <div class="progress-percent">${project.progress}%</div>
                    </div>
                </div>
            `).join("");
        }

        // 매출 요약 렌더링
        function renderMetrics() {
            const metrics = document.getElementById("metrics");
            const totalRevenue = 71_577_000;
            const avgRevenue = 2_453_000;

            metrics.innerHTML = `
                <div class="metric-card">
                    <div class="metric-label">총 매출</div>
                    <div class="metric-value">${(totalRevenue / 1000000).toFixed(1)}M</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">평균 거래액</div>
                    <div class="metric-value">${(avgRevenue / 1000000).toFixed(1)}M</div>
                </div>
            `;
        }

        // 마크다운을 HTML로 간단 변환
        function mdToHtml(text) {
            return text
                // 헤더
                .replace(/^### (.+)$/gm, '<h3>$1</h3>')
                .replace(/^## (.+)$/gm, '<h3>$1</h3>')
                // 굵은 텍스트
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                // 표: 헤더 구분선 제거
                .replace(/^\|[-:| ]+\|$/gm, '')
                // 표: 행 변환
                .replace(/^\|(.+)\|$/gm, (_, row) => {
                    const cells = row.split('|').map(c => c.trim());
                    return '<tr>' + cells.map(c => `<td>${c}</td>`).join('') + '</tr>';
                })
                // 표 행들을 table로 감싸기
                .replace(/((<tr>.+<\/tr>\n?)+)/g, '<table><tbody>$1</tbody></table>')
                // 첫 번째 tr을 thead로
                .replace(/<table><tbody>(<tr>(.+?)<\/tr>)/g, '<table><thead>$1</thead><tbody>')
                .replace(/<\/thead><tbody>(<tr>)/g, '</thead><tbody>$1')
                // 불릿 리스트
                .replace(/^\* (.+)$/gm, '<li>$1</li>')
                .replace(/^- (.+)$/gm, '<li>$1</li>')
                .replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>')
                // 수평선
                .replace(/^---+$/gm, '<hr>')
                // 빈 줄 → 단락 구분
                .replace(/\n\n/g, '<br>');
        }

        // 서버 로컬 여부 감지 (localhost에서만 API 버튼 활성화)
        const isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';

        // AI API 호출 공통 함수
        async function callApi(endpoint, btn, loadFn, labels) {
            btn.disabled = true;
            btn.textContent = '⏳ AI 생성 중...';
            try {
                const res = await fetch(endpoint, { method: 'POST' });
                if (!res.ok) throw new Error('서버 오류');
                btn.textContent = '✅ 완료!';
                await loadFn();
            } catch (e) {
                btn.textContent = '❌ 실패 - 다시 시도';
            } finally {
                setTimeout(() => {
                    btn.disabled = false;
                    btn.textContent = labels.default;
                }, 2500);
            }
        }

        // 회의록 분석 로드
        async function loadMeeting() {
            const contentEl = document.getElementById('meetingContent');
            const updatedEl = document.getElementById('meetingUpdatedAt');
            const btn = document.getElementById('btnMeeting');

            try {
                const res = await fetch('./meeting-result.json?t=' + Date.now());
                if (!res.ok) throw new Error('파일 없음');
                const data = await res.json();

                const formatted = new Date(data.updated_at).toLocaleString('ko-KR', {
                    month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit'
                });
                updatedEl.textContent = `마지막 분석: ${formatted}`;

                const filesHtml = data.files_analyzed
                    ? `<div style="font-size:0.8em;color:var(--text-secondary);margin-bottom:12px;">분석 파일: ${data.files_analyzed.join(', ')}</div>`
                    : '';
                contentEl.innerHTML = filesHtml + `<div class="meeting-content">${mdToHtml(data.analysis)}</div>`;

            } catch (e) {
                updatedEl.textContent = '';
                contentEl.innerHTML = isLocal
                    ? `<div class="meeting-empty">버튼을 눌러 회의록을 분석해보세요! 🚀</div>`
                    : `<div class="meeting-empty">아직 분석된 회의록이 없습니다.<br>터미널에서 아래 명령어를 실행해보세요 👇<br><br><code>npm run meeting</code></div>`;
            }

            btn.onclick = null;
            if (isLocal) {
                btn.onclick = () => callApi('/api/meeting', btn, loadMeeting, { default: '🔄 다시 분석' });
            } else {
                btn.onclick = () => {
                    btn.textContent = '⏳ npm run meeting 실행 후 새로고침';
                    setTimeout(() => { btn.textContent = '🔄 다시 분석'; }, 3000);
                };
            }
        }

        // AI 아침 브리핑 로드
        async function loadBriefing() {
            const contentEl = document.getElementById('briefingContent');
            const updatedEl = document.getElementById('briefingUpdatedAt');
            const btn = document.getElementById('btnRebriefing');

            try {
                const res = await fetch('./brief.json?t=' + Date.now());
                if (!res.ok) throw new Error('파일 없음');
                const data = await res.json();

                const formatted = new Date(data.updated_at).toLocaleString('ko-KR', {
                    month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit'
                });
                updatedEl.textContent = `마지막 업데이트: ${formatted}`;
                contentEl.innerHTML = `<div class="briefing-content">${data.summary.replace(/</g, '&lt;').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')}</div>`;

            } catch (e) {
                updatedEl.textContent = '';
                contentEl.innerHTML = isLocal
                    ? `<div class="briefing-empty">버튼을 눌러 오늘의 브리핑을 받아보세요! 🚀</div>`
                    : `<div class="briefing-empty">아직 브리핑이 없습니다.<br>터미널에서 아래 명령어를 실행해보세요 👇<br><br><code>npm run brief</code></div>`;
            }

            btn.onclick = null;
            if (isLocal) {
                btn.onclick = () => callApi('/api/brief', btn, loadBriefing, { default: '🔄 다시 브리핑' });
            } else {
                btn.onclick = () => {
                    btn.textContent = '⏳ npm run brief 실행 후 새로고침';
                    setTimeout(() => { btn.textContent = '🔄 다시 브리핑'; }, 3000);
                };
            }
        }

        // 초기화
        initTheme();
        loadMeeting();
        loadBriefing();
        renderTodos();
        renderSchedule();
        renderProjects();
        renderMetrics();

        // Service Worker 등록
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(registration => {
                        console.log('✅ Service Worker 등록 완료:', registration);
                    })
                    .catch(error => {
                        console.error('❌ Service Worker 등록 실패:', error);
                    });
            });
        }
    </script>
</body>
</html>
